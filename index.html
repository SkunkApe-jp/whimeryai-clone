<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ars Verborum</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #F8F6F1;
    font-family: Georgia, serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
  }

  .header { text-align: center; margin-bottom: 32px; }
  .header h1 {
    font-size: 34px;
    font-weight: 700;
    color: #1a1a2e;
    letter-spacing: -0.5px;
  }
  .header p {
    font-size: 15px;
    color: #6B6B6B;
    margin-top: 6px;
    font-style: italic;
  }

  .input-card {
    width: 100%;
    max-width: 660px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    padding: 24px;
    margin-bottom: 28px;
  }

  textarea {
    width: 100%;
    min-height: 130px;
    border: 1.5px solid #E2DDD8;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 15px;
    font-family: Georgia, serif;
    color: #2a2a2a;
    background: #FDFCFA;
    resize: vertical;
    outline: none;
    line-height: 1.65;
  }
  textarea:focus { border-color: #A78BFA; }

  .input-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 14px;
  }

  .word-count { font-size: 13px; color: #aaa; }

  /* Gear button */
  .gear-btn {
    position: fixed;
    top: 18px;
    right: 18px;
    width: 40px;
    height: 40px;
    background: #fff;
    border: 1.5px solid #E2DDD8;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    transition: border-color 0.2s, box-shadow 0.2s;
    z-index: 100;
  }
  .gear-btn:hover {
    border-color: #A78BFA;
    box-shadow: 0 2px 12px rgba(167,139,250,0.25);
  }
  .gear-btn svg { width: 20px; height: 20px; fill: #6B6B6B; }
  .gear-btn.configured svg { fill: #16A34A; }

  .download-btn {
    position: fixed;
    right: 18px;
    bottom: 18px;
    width: 44px;
    height: 44px;
    background: #fff;
    border: 1.5px solid #E2DDD8;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    transition: border-color 0.2s, box-shadow 0.2s, opacity 0.2s;
    z-index: 100;
  }
  .download-btn:hover:not(:disabled) {
    border-color: #A78BFA;
    box-shadow: 0 2px 12px rgba(167,139,250,0.25);
  }
  .download-btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }
  .download-btn svg { width: 22px; height: 22px; fill: #6B6B6B; }

  /* Modal overlay */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: #fff;
    border-radius: 16px;
    padding: 28px 24px 20px;
    width: 90%;
    max-width: 420px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    animation: fadeUp 0.25s ease;
  }
  .modal h2 {
    font-size: 20px;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 20px;
  }
  .modal label {
    display: block;
    font-size: 13px;
    color: #6B6B6B;
    margin-bottom: 5px;
  }
  .modal input, .modal select {
    width: 100%;
    border: 1.5px solid #E2DDD8;
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 14px;
    font-family: monospace;
    color: #2a2a2a;
    background: #FDFCFA;
    outline: none;
    margin-bottom: 16px;
  }
  .modal input:focus, .modal select:focus { border-color: #A78BFA; }
  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 4px;
  }
  .modal-cancel {
    background: none;
    border: 1.5px solid #E2DDD8;
    border-radius: 8px;
    padding: 8px 20px;
    font-size: 14px;
    font-family: Georgia, serif;
    color: #6B6B6B;
    cursor: pointer;
  }
  .modal-save {
    background: #1E3A8A;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 20px;
    font-size: 14px;
    font-family: Georgia, serif;
    font-weight: 600;
    cursor: pointer;
  }

  .generate-btn {
    background: #1E3A8A;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 10px 28px;
    font-size: 15px;
    font-family: Georgia, serif;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .generate-btn:disabled {
    background: #C4B5FD;
    cursor: not-allowed;
  }

  .error-msg {
    color: #DC2626;
    font-size: 14px;
    margin-bottom: 16px;
    display: none;
  }

  .loading-card {
    width: 100%;
    max-width: 660px;
    height: 180px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 4px solid #E9D5FF;
    border-top: 4px solid #7C3AED;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  .loading-text {
    color: #9CA3AF;
    font-size: 14px;
    font-style: italic;
  }

  .results {
    width: 100%;
    max-width: 660px;
    display: none;
    flex-direction: column;
    gap: 24px;
    animation: fadeUp 0.5s ease;
  }

  .card {
    background: #fff;
    border-radius: 20px;
    padding: 32px 28px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }

  .mindmap-card { padding: 20px 12px; }

  /* Vocabulary Card */
  .vocab-word {
    font-size: 58px;
    font-weight: 700;
    color: #1E3A8A;
    line-height: 1.1;
    letter-spacing: -1px;
    margin-bottom: 10px;
  }
  .vocab-ipa {
    font-size: 17px;
    color: #6B7EAA;
    font-family: monospace;
    margin-bottom: 14px;
    letter-spacing: 0.5px;
  }
  .vocab-def-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 24px;
  }
  .vocab-pos {
    border-radius: 6px;
    padding: 2px 10px;
    font-size: 13px;
    font-weight: 700;
    font-style: italic;
    color: #374151;
    font-family: Georgia, serif;
  }
  .vocab-definition {
    font-size: 15px;
    color: #374151;
    font-family: Georgia, serif;
  }
  .fun-fact-wrapper {
    position: relative;
    margin-bottom: 24px;
  }
  .fun-fact-badge {
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    background: #FDE68A;
    border-radius: 20px;
    padding: 4px 18px;
    font-size: 13px;
    font-weight: 700;
    color: #78350F;
    font-family: Georgia, serif;
    white-space: nowrap;
    z-index: 1;
  }
  .fun-fact-body {
    background: #EFF6FF;
    border-radius: 14px;
    padding: 22px 18px 16px;
    font-size: 15px;
    color: #374151;
    font-family: Georgia, serif;
    line-height: 1.65;
    text-align: center;
  }
  .vocab-example {
    font-size: 15px;
    color: #6B7280;
    font-family: Georgia, serif;
    font-style: italic;
    text-align: center;
    border-top: 1px solid #F3F4F6;
    padding-top: 16px;
  }

  /* Visual Journey Card */
  .journey-title {
    font-size: 22px;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 20px;
  }
  .journey-narrative {
    font-size: 16px;
    color: #374151;
    line-height: 1.85;
    margin-bottom: 24px;
    text-align: justify;
  }
  .journey-highlight {
    background: #DBEAFE;
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 15px;
    font-weight: 600;
    color: #1E40AF;
    line-height: 1.55;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: none; }
  }
</style>
</head>
<body>

<!-- Gear icon -->
<button class="gear-btn" id="gearBtn" title="AI Settings">
  <svg viewBox="0 0 24 24"><path d="M19.14 12.94a7.07 7.07 0 0 0 .06-.94c0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a7.04 7.04 0 0 0-1.62-.94l-.36-2.54a.48.48 0 0 0-.48-.41h-3.84a.48.48 0 0 0-.48.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.48.48 0 0 0-.59.22L2.74 8.87a.48.48 0 0 0 .12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.37 1.03.7 1.62.94l.36 2.54c.05.24.26.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54c.59-.24 1.13-.57 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 0 0-.12-.61l-2.03-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"/></svg>
</button>
<button class="download-btn" id="downloadBtn" title="Download mindmap" disabled>
  <svg viewBox="0 0 24 24" aria-hidden="true">
    <path d="M5 20h14v-2H5v2zm7-18-5.5 5.5 1.41 1.41L11 5.83V16h2V5.83l3.09 3.08 1.41-1.41L12 2z"></path>
  </svg>
</button>

<!-- Settings modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>AI Configuration</h2>
    <label for="cfgProvider">Provider</label>
    <select id="cfgProvider">
      <option value="anthropic">Anthropic</option>
      <option value="openai">OpenAI-compatible</option>
    </select>
    <label for="cfgApiUrl">API URL</label>
    <input id="cfgApiUrl" type="text" placeholder="https://api.anthropic.com/v1/messages" />
    <label for="cfgApiKey">API Key</label>
    <input id="cfgApiKey" type="password" placeholder="sk-ant-..." />
    <label for="cfgModel">Model</label>
    <input id="cfgModel" type="text" placeholder="claude-sonnet-4-20250514" />
    <div class="modal-actions">
      <button class="modal-cancel" id="modalCancel">Cancel</button>
      <button class="modal-save" id="modalSave">Save</button>
    </div>
  </div>
</div>

<div class="header">
  <h1>Ars Verborum</h1>
  <p>Paste any text — get a mindmap, a word, and a journey</p>
</div>

<div class="input-card">
  <textarea id="inputText" placeholder="Paste a paragraph, quote, poem, or any text..."></textarea>
  <div class="input-footer">
    <span class="word-count" id="wordCount"></span>
    <button class="generate-btn" id="generateBtn" disabled>Generate</button>
  </div>
</div>

<p class="error-msg" id="errorMsg"></p>

<div class="loading-card" id="loadingCard">
  <div class="spinner"></div>
  <p class="loading-text">Reading between the lines...</p>
</div>

<div class="results" id="results">
  <div class="card mindmap-card" id="mindmapCard"></div>
  <div class="card" id="vocabCard"></div>
  <div class="card" id="journeyCard"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
<script>
const COLORS = [
  { node: "#C084FC", edge: "#C084FC", leaf: "#E9D5FF", text: "#581C87" },
  { node: "#FDE047", edge: "#FDE047", leaf: "#FEF9C3", text: "#713F12" },
  { node: "#86EFAC", edge: "#86EFAC", leaf: "#DCFCE7", text: "#14532D" },
  { node: "#F9A8D4", edge: "#F9A8D4", leaf: "#FCE7F3", text: "#831843" },
  { node: "#67E8F9", edge: "#67E8F9", leaf: "#CFFAFE", text: "#164E63" },
];
const CENTER_COLOR = { node: "#1E3A8A", text: "#FFFFFF" };

const POS_COLORS = {
  adj:  "#DBEAFE",
  adv:  "#D1FAE5",
  noun: "#FEF3C7",
  verb: "#FCE7F3",
};

const inputText   = document.getElementById("inputText");
const wordCount   = document.getElementById("wordCount");
const generateBtn = document.getElementById("generateBtn");
const errorMsg    = document.getElementById("errorMsg");
const loadingCard = document.getElementById("loadingCard");
const resultsDiv  = document.getElementById("results");
const mindmapCard = document.getElementById("mindmapCard");
const vocabCard   = document.getElementById("vocabCard");
const journeyCard = document.getElementById("journeyCard");

/* ---- Settings modal ---- */
const gearBtn      = document.getElementById("gearBtn");
const modalOverlay = document.getElementById("modalOverlay");
const cfgProvider  = document.getElementById("cfgProvider");
const cfgApiUrl    = document.getElementById("cfgApiUrl");
const cfgApiKey    = document.getElementById("cfgApiKey");
const cfgModel     = document.getElementById("cfgModel");
const modalCancel  = document.getElementById("modalCancel");
const modalSave    = document.getElementById("modalSave");
const downloadBtn  = document.getElementById("downloadBtn");

const PROVIDER_DEFAULTS = {
  anthropic: {
    apiUrl: "https://api.anthropic.com/v1/messages",
    model:  "claude-sonnet-4-20250514",
    keyPlaceholder: "sk-ant-...",
  },
  openai: {
    apiUrl: "https://api.openai.com/v1/chat/completions",
    model:  "gpt-4o-mini",
    keyPlaceholder: "sk-...",
  },
};

const DEFAULTS = {
  provider: "anthropic",
  apiUrl: PROVIDER_DEFAULTS.anthropic.apiUrl,
  apiKey: "",
  model:  PROVIDER_DEFAULTS.anthropic.model,
};

function loadConfig() {
  try { return JSON.parse(localStorage.getItem("ars_verborum_config")) || {}; } catch { return {}; }
}
function saveConfig(cfg) {
  localStorage.setItem("ars_verborum_config", JSON.stringify(cfg));
}
function getConfig() {
  const stored = loadConfig();
  const provider = PROVIDER_DEFAULTS[stored.provider] ? stored.provider : DEFAULTS.provider;
  const providerDefaults = PROVIDER_DEFAULTS[provider];
  return {
    provider,
    apiUrl: stored.apiUrl || providerDefaults.apiUrl,
    apiKey: stored.apiKey || DEFAULTS.apiKey,
    model:  stored.model  || providerDefaults.model,
  };
}

function refreshGearIcon() {
  const cfg = getConfig();
  gearBtn.classList.toggle("configured", cfg.apiKey.length > 0);
}

/* Swap URL/model/key placeholders when the provider changes in the modal,
   but only when the field still holds the previous provider's default. */
cfgProvider.addEventListener("change", () => {
  const prev = cfgProvider.dataset.prevProvider || DEFAULTS.provider;
  const next = cfgProvider.value;
  const prevDefaults = PROVIDER_DEFAULTS[prev];
  const nextDefaults = PROVIDER_DEFAULTS[next];
  if (!cfgApiUrl.value.trim() || cfgApiUrl.value.trim() === prevDefaults.apiUrl) {
    cfgApiUrl.value = nextDefaults.apiUrl;
  }
  if (!cfgModel.value.trim() || cfgModel.value.trim() === prevDefaults.model) {
    cfgModel.value = nextDefaults.model;
  }
  cfgApiUrl.placeholder = nextDefaults.apiUrl;
  cfgModel.placeholder  = nextDefaults.model;
  cfgApiKey.placeholder = nextDefaults.keyPlaceholder;
  cfgProvider.dataset.prevProvider = next;
});

gearBtn.addEventListener("click", () => {
  const cfg = getConfig();
  const providerDefaults = PROVIDER_DEFAULTS[cfg.provider];
  cfgProvider.value = cfg.provider;
  cfgProvider.dataset.prevProvider = cfg.provider;
  cfgApiUrl.value = cfg.apiUrl;
  cfgApiKey.value = cfg.apiKey;
  cfgModel.value  = cfg.model;
  cfgApiUrl.placeholder = providerDefaults.apiUrl;
  cfgModel.placeholder  = providerDefaults.model;
  cfgApiKey.placeholder = providerDefaults.keyPlaceholder;
  modalOverlay.classList.add("open");
});

modalCancel.addEventListener("click", () => modalOverlay.classList.remove("open"));
modalOverlay.addEventListener("click", (e) => {
  if (e.target === modalOverlay) modalOverlay.classList.remove("open");
});

modalSave.addEventListener("click", () => {
  const provider = PROVIDER_DEFAULTS[cfgProvider.value] ? cfgProvider.value : DEFAULTS.provider;
  const providerDefaults = PROVIDER_DEFAULTS[provider];
  saveConfig({
    provider,
    apiUrl: cfgApiUrl.value.trim() || providerDefaults.apiUrl,
    apiKey: cfgApiKey.value.trim(),
    model:  cfgModel.value.trim()  || providerDefaults.model,
  });
  modalOverlay.classList.remove("open");
  refreshGearIcon();
  updateBtnState();
});

refreshGearIcon();

downloadBtn.addEventListener("click", downloadMindmap);

/* ---- Button state ---- */
function updateBtnState() {
  const hasText = inputText.value.trim().length > 0;
  const hasKey  = getConfig().apiKey.length > 0;
  generateBtn.disabled = !(hasText && hasKey);
}

inputText.addEventListener("input", () => {
  const val = inputText.value.trim();
  wordCount.textContent = val.length > 0
    ? val.split(/\s+/).filter(Boolean).length + " words"
    : "";
  updateBtnState();
});

updateBtnState();
generateBtn.addEventListener("click", generate);

async function generate() {
  const text = inputText.value.trim();
  if (!text) return;

  generateBtn.disabled = true;
  generateBtn.textContent = "Thinking...";
  errorMsg.style.display = "none";
  resultsDiv.style.display = "none";
  loadingCard.style.display = "flex";

  const prompt = `Analyze the following text and return a JSON object with three sections. Return ONLY valid JSON, no markdown, no explanation, no code fences.

{
  "mindmap": {
    "center": "1-2 word core theme",
    "clusters": [
      { "name": "BranchWord", "leaves": ["Word1", "Word2", "Word3"] },
      { "name": "BranchWord", "leaves": ["Word1", "Word2", "Word3"] },
      { "name": "BranchWord", "leaves": ["Word1", "Word2", "Word3"] }
    ]
  },
  "vocabulary": {
    "word": "one interesting or advanced word from the text",
    "ipa": "IPA pronunciation e.g. /\u02C8w\u025C\u02D0rd/",
    "pos": "adj or noun or verb or adv",
    "definition": "clear concise definition",
    "funFact": "one surprising or memorable fact about this word or its origin, 1-2 sentences",
    "example": "a natural example sentence using the word"
  },
  "visualJourney": {
    "narrative": "A vivid immersive 3-4 sentence narrative drawing the reader into the scene or subject, using sensory second-person language where possible",
    "highlight": "One interesting factual sentence from or related to the text, not repeating the narrative"
  }
}

Rules:
- mindmap: 3 clusters, 2-3 leaves each, evocative mood words not literal descriptors
- vocabulary: pick a non-trivial word, avoid the most common words
- English only, no emojis

Text:
"""
${text}
"""`;

  try {
    const cfg = getConfig();
    const req = buildRequest(cfg, prompt);
    const res = await fetch(cfg.apiUrl, {
      method: "POST",
      headers: req.headers,
      body: JSON.stringify(req.body),
    });

    const responseText = await res.text();
    let data = null;
    try { data = responseText ? JSON.parse(responseText) : null; } catch { /* non-JSON response */ }

    if (!res.ok) {
      throw new Error(extractApiError(data, responseText, res.status));
    }

    const raw = extractContent(cfg.provider, data);
    if (!raw) {
      throw new Error("Empty response from model.");
    }
    const clean = raw.replace(/```json|```/g, "").trim();

    let parsed;
    try {
      parsed = JSON.parse(clean);
    } catch {
      throw new Error("Model did not return valid JSON.");
    }

    renderMindmap(parsed.mindmap);
    renderVocabulary(parsed.vocabulary);
    renderJourney(parsed.visualJourney);

    loadingCard.style.display = "none";
    resultsDiv.style.display = "flex";
  } catch (e) {
    loadingCard.style.display = "none";
    const detail = (e && e.message) ? e.message : String(e);
    errorMsg.textContent = "Could not generate: " + detail;
    errorMsg.style.display = "block";
  } finally {
    updateBtnState();
    generateBtn.textContent = "Generate";
  }
}

function buildRequest(cfg, prompt) {
  if (cfg.provider === "openai") {
    return {
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + cfg.apiKey,
      },
      body: {
        model: cfg.model,
        max_tokens: 1500,
        messages: [{ role: "user", content: prompt }],
      },
    };
  }
  return {
    headers: {
      "Content-Type": "application/json",
      "x-api-key": cfg.apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: {
      model: cfg.model,
      max_tokens: 1500,
      messages: [{ role: "user", content: prompt }],
    },
  };
}

function extractContent(provider, data) {
  if (!data) return "";
  if (provider === "openai") {
    const choice = (data.choices && data.choices[0]) || {};
    const msg = choice.message || {};
    if (typeof msg.content === "string") return msg.content;
    if (Array.isArray(msg.content)) {
      return msg.content.map(p => (typeof p === "string" ? p : (p && p.text) || "")).join("");
    }
    return "";
  }
  return (data.content || []).map(b => b.text || "").join("");
}

function extractApiError(data, responseText, status) {
  if (data && data.error) {
    if (typeof data.error === "string") return data.error;
    if (data.error.message) return data.error.message;
  }
  if (data && data.message) return data.message;
  const body = (responseText || "").trim();
  if (body) return "HTTP " + status + " - " + body.slice(0, 300);
  return "HTTP " + status;
}

/* ---- Mindmap SVG ---- */
function renderMindmap(data) {
  const W = 700, H = 500;
  const cx = W / 2, cy = H / 2;
  const branchR = 155, leafR = 100;

  const clusters = data.clusters || [];
  const n = clusters.length;
  const angles = clusters.map((_, i) => (2 * Math.PI * i) / n - Math.PI / 2);

  const edges = [];
  const branches = [];
  const leaves = [];

  clusters.forEach((cluster, ci) => {
    const angle = angles[ci];
    const color = COLORS[ci % COLORS.length];
    const bx = cx + branchR * Math.cos(angle);
    const by = cy + branchR * Math.sin(angle);

    edges.push({ x1: cx, y1: cy, x2: bx, y2: by, color: color.edge });
    branches.push({ x: bx, y: by, label: cluster.name, color });

    const lvs = cluster.leaves || [];
    const lCount = lvs.length;
    const spread = Math.PI * 0.6;
    lvs.forEach((leaf, li) => {
      const offset = lCount > 1
        ? -spread / 2 + (spread / (lCount - 1)) * li
        : 0;
      const la = angle + offset;
      const lx = bx + leafR * Math.cos(la);
      const ly = by + leafR * Math.sin(la);

      edges.push({ x1: bx, y1: by, x2: lx, y2: ly, color: color.edge });
      leaves.push({ x: lx, y: ly, label: leaf, color });
    });
  });

  mindmapCard.innerHTML = "";
  const svg = d3.select(mindmapCard)
    .append("svg")
    .attr("id", "mindmapSvg")
    .attr("viewBox", `0 0 ${W} ${H}`)
    .attr("width", "100%")
    .attr("height", "100%")
    .style("overflow", "visible");

  svg.append("g")
    .selectAll("line")
    .data(edges)
    .enter()
    .append("line")
    .attr("x1", d => d.x1)
    .attr("y1", d => d.y1)
    .attr("x2", d => d.x2)
    .attr("y2", d => d.y2)
    .attr("stroke", d => d.color)
    .attr("stroke-width", 6)
    .attr("stroke-linecap", "round")
    .attr("opacity", 0.85);

  const leafGroup = svg.append("g")
    .selectAll("g")
    .data(leaves)
    .enter()
    .append("g");

  leafGroup.each(function(nd) {
    const g = d3.select(this);
    const label = truncateLabel(nd.label, 16);
    const w = Math.min(Math.max(label.length * 9 + 24, 72), 180);
    const h = 36;

    g.append("rect")
      .attr("x", nd.x - w / 2)
      .attr("y", nd.y - h / 2)
      .attr("width", w)
      .attr("height", h)
      .attr("rx", 8)
      .attr("fill", nd.color.leaf)
      .attr("stroke", nd.color.node)
      .attr("stroke-width", 2);

    g.append("rect")
      .attr("x", nd.x - w / 2)
      .attr("y", nd.y + h / 2 - 5)
      .attr("width", w)
      .attr("height", 5)
      .attr("fill", nd.color.node)
      .attr("opacity", 0.25);

    g.append("text")
      .attr("x", nd.x)
      .attr("y", nd.y + 1)
      .attr("text-anchor", "middle")
      .attr("dominant-baseline", "middle")
      .attr("font-size", 14)
      .attr("font-family", "Georgia, serif")
      .attr("fill", nd.color.text)
      .attr("font-weight", 500)
      .text(label);
  });

  const branchGroup = svg.append("g")
    .selectAll("g")
    .data(branches)
    .enter()
    .append("g");

  branchGroup.append("circle")
    .attr("cx", d => d.x)
    .attr("cy", d => d.y)
    .attr("r", 38)
    .attr("fill", d => d.color.node)
    .attr("opacity", 0.95);

  branchGroup.each(function(nd) {
    drawWrappedText(
      d3.select(this),
      nd.label,
      nd.x,
      nd.y,
      60,
      2,
      13,
      "#111",
      700
    );
  });

  svg.append("circle")
    .attr("cx", cx)
    .attr("cy", cy)
    .attr("r", 52)
    .attr("fill", CENTER_COLOR.node);

  drawWrappedText(
    svg,
    data.center || "",
    cx,
    cy,
    84,
    2,
    15,
    CENTER_COLOR.text,
    700
  );

  downloadBtn.disabled = false;
}

function truncateLabel(label, maxChars) {
  const text = (label || "").trim();
  if (text.length <= maxChars) return text;
  return text.slice(0, Math.max(0, maxChars - 1)).trimEnd() + "…";
}

function drawWrappedText(group, text, x, y, maxWidth, maxLines, fontSize, color, weight) {
  const words = (text || "").trim().split(/\s+/).filter(Boolean);
  if (!words.length) return;

  const lineCharCap = Math.max(1, Math.floor(maxWidth / (fontSize * 0.55)));
  const lines = [];
  let line = "";

  words.forEach(word => {
    const candidate = line ? `${line} ${word}` : word;
    if (candidate.length <= lineCharCap) {
      line = candidate;
      return;
    }
    if (line) lines.push(line);
    line = word;
  });
  if (line) lines.push(line);

  const finalLines = lines.slice(0, maxLines).map((ln, i) => {
    if (i !== maxLines - 1 || lines.length <= maxLines) return ln;
    return truncateLabel(ln, lineCharCap);
  });

  const textEl = group.append("text")
    .attr("x", x)
    .attr("y", y)
    .attr("text-anchor", "middle")
    .attr("dominant-baseline", "middle")
    .attr("font-size", fontSize)
    .attr("font-family", "Georgia, serif")
    .attr("fill", color)
    .attr("font-weight", weight);

  const lineHeight = fontSize + 2;
  const startDy = -((finalLines.length - 1) * lineHeight) / 2;
  finalLines.forEach((ln, i) => {
    textEl.append("tspan")
      .attr("x", x)
      .attr("dy", i === 0 ? startDy : lineHeight)
      .text(ln);
  });
}

/* ---- Vocabulary Card ---- */
function renderVocabulary(vocab) {
  const posKey = (vocab.pos || "").toLowerCase().slice(0, 4);
  const bg = POS_COLORS[posKey] || "#F3F4F6";

  vocabCard.innerHTML = `
    <div class="vocab-word">${esc(vocab.word)}</div>
    <div class="vocab-ipa">${esc(vocab.ipa)}</div>
    <div class="vocab-def-row">
      <span class="vocab-pos" style="background:${bg}">${esc(vocab.pos)}.</span>
      <span class="vocab-definition">${esc(vocab.definition)}</span>
    </div>
    <div class="fun-fact-wrapper">
      <div class="fun-fact-badge">Fun Fact</div>
      <div class="fun-fact-body">${esc(vocab.funFact)}</div>
    </div>
    <div class="vocab-example">${esc(vocab.example)}</div>
  `;
}

/* ---- Visual Journey Card ---- */
function renderJourney(journey) {
  journeyCard.innerHTML = `
    <div class="journey-title">Visual Journey</div>
    <p class="journey-narrative">${esc(journey.narrative)}</p>
    <div class="journey-highlight">${esc(journey.highlight)}</div>
  `;
}

/* ---- Helpers ---- */
function esc(str) {
  const d = document.createElement("div");
  d.textContent = str || "";
  return d.innerHTML;
}

function downloadMindmap() {
  const svgEl = document.getElementById("mindmapSvg");
  if (!svgEl) return;

  const serializer = new XMLSerializer();
  const source = serializer.serializeToString(svgEl);
  const blob = new Blob([source], { type: "image/svg+xml;charset=utf-8" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "mindmap.svg";
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}
